version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: proyecto4_db
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: proyecto4_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://appuser:app_password@postgres:5432/app_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: proyecto4_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  db_data: